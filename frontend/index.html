<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fluence Lead Scanner">
<title>Fluence Lead Scanner</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230c0e09' width='180' height='180'/%3E%3Ctext x='90' y='110' font-family='system-ui' font-size='80' font-weight='800' fill='%23C8F135' text-anchor='middle'%3EFL%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --fl:#C8F135;
  --bg:#0c0e09;
  --surf:#141a0f;
  --surf2:#1c2316;
  --bdr:rgba(200,241,53,0.1);
  --bdr2:rgba(200,241,53,0.2);
  --tx:#f4f8ed;
  --tx2:rgba(244,248,237,0.65);
  --tx3:rgba(244,248,237,0.38);
  --btn-bg:#1c2316;
  --btn-bdr:#283020;
  --btn-tx:#8ca478;
  --inp-bg:rgba(200,241,53,0.05);
  --inp-bdr:rgba(200,241,53,0.2);
  --red:#ff5252;
  --red-bg:rgba(255,82,82,0.13);
  --red-tx:#ff9090;
  --amb:#ffc107;
  --amb-bg:rgba(255,193,7,0.13);
  --amb-tx:#ffd54f;
  --blu:#64b5f6;
  --blu-bg:rgba(100,181,246,0.13);
  --blu-tx:#90caf9;
  --radius:16px;
  --radius-sm:12px;
  --radius-xs:8px
}
[data-theme=light]{
  --bg:#f0f5e3;
  --surf:#ffffff;
  --surf2:#ecf3d8;
  --bdr:rgba(0,0,0,0.09);
  --bdr2:rgba(0,0,0,0.15);
  --tx:#0e1508;
  --tx2:#3a4e25;
  --tx3:#7a8a65;
  --btn-bg:#e2ecca;
  --btn-bdr:#c5d9a5;
  --btn-tx:#3a4e25;
  --inp-bg:#ffffff;
  --inp-bdr:rgba(0,0,0,0.16);
  --red:#c62828;
  --red-bg:#fff0f0;
  --red-tx:#8b0000;
  --amb:#8a6000;
  --amb-bg:#fff8e0;
  --amb-tx:#5d4000;
  --blu:#1565c0;
  --blu-bg:#e3f2fd;
  --blu-tx:#0d47a1
}
html,body{width:100%;height:100%;-webkit-user-select:none;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;min-height:100vh;position:fixed;overflow:hidden}
.app{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden}

/* ---- OFFLINE BAR ---- */
.offline-bar{background:#ff5252;color:#fff;font-size:12px;font-weight:700;padding:8px 16px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0}

/* ---- LOGIN SCREEN ---- */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.login-screen .logo-svg{height:36px;width:auto;margin-bottom:4px}
.login-screen .logo-sub{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.login-card{width:100%;max-width:380px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);padding:24px}
.login-card h2{font-size:20px;font-weight:800;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--tx2);margin-bottom:20px}
.login-card .field{margin-bottom:14px}
.login-card .inp{background:var(--inp-bg);border:1px solid var(--inp-bdr);color:var(--tx);font-family:inherit;font-size:15px;padding:13px 14px;border-radius:var(--radius-sm);outline:none;width:100%;-webkit-appearance:none;transition:border 0.15s;min-height:44px}
.login-card .inp:focus{border-color:var(--fl)}
.login-card .inp::placeholder{color:var(--tx3)}
.login-btn{width:100%;background:var(--fl);border:none;color:#0e1508;font-family:inherit;font-size:15px;font-weight:800;padding:14px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;min-height:52px}
.login-btn:active{opacity:0.85}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-err{font-size:13px;color:var(--red);margin-top:10px;text-align:center;display:none}
.login-reg{font-size:13px;color:var(--tx3);text-align:center;margin-top:14px}
.login-reg a{color:var(--fl);cursor:pointer;text-decoration:none;font-weight:600}
.login-loading{display:none;align-items:center;justify-content:center;gap:8px}
.login-loading.show{display:flex}
.spinner{width:18px;height:18px;border:2px solid #0e1508;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.header{background:var(--bg);border-bottom:1px solid var(--bdr);padding:max(13px,env(safe-area-inset-top)) 16px 13px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-wrap{flex:1;display:flex;flex-direction:column;gap:3px}
.logo-svg{height:28px;width:auto}
.logo-sub{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:2px;text-transform:uppercase}
.show-tag{background:var(--fl);color:#0e1508;font-size:10px;font-weight:800;padding:4px 10px;border-radius:4px;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap;cursor:pointer;flex-shrink:0;border:none;min-height:28px}
.user-badge{font-size:12px;font-weight:700;color:var(--tx2);display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-badge i{font-size:14px;color:var(--fl)}
.logout-btn{width:36px;height:36px;border-radius:50%;background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
.theme-btn{width:36px;height:36px;border-radius:50%;background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;flex-shrink:0}

.nav{display:grid;grid-template-columns:1fr 1fr;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0}
.nav-btn{background:none;border:none;color:var(--tx3);font-family:inherit;font-size:13px;font-weight:600;padding:15px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;border-bottom:2px solid transparent;letter-spacing:0.3px;transition:color 0.15s;min-height:44px}
.nav-btn i{font-size:19px}
.nav-btn.active{color:var(--fl);border-bottom-color:var(--fl)}

.content{flex:1;display:flex;overflow:hidden}
.panel{display:none;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:16px;padding-bottom:env(safe-area-inset-bottom)}
.panel.active{display:block}

.sec{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin:20px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--bdr)}
.sec:first-child{margin-top:0}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lbl{font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:0.5px;text-transform:uppercase}
.inp{background:var(--inp-bg);border:1px solid var(--inp-bdr);color:var(--tx);font-family:inherit;font-size:15px;padding:12px 14px;border-radius:var(--radius-sm);outline:none;width:100%;-webkit-appearance:none;transition:border 0.15s;min-height:44px}
.inp:focus{border-color:var(--fl)}
.inp::placeholder{color:var(--tx3)}
select.inp option{background:var(--surf2);color:var(--tx)}
textarea.inp{resize:none;min-height:84px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ---- SCAN CARD ---- */
.scan-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);overflow:hidden;margin-bottom:0}
.scan-btns{display:grid;grid-template-columns:1fr 1fr}
.scan-btn{background:var(--btn-bg);border:none;border-right:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:13px;font-weight:600;padding:18px 12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;min-height:80px}
.scan-btn:last-child{border-right:none}
.scan-btn:active{opacity:0.75}
.scan-btn i{font-size:26px;color:var(--fl);flex-shrink:0}
.scan-label{display:flex;flex-direction:column;align-items:flex-start}
.scan-sub{font-size:11px;font-weight:400;opacity:0.65;margin-top:2px}
.scan-prev{width:100%;max-height:140px;object-fit:cover;display:none;border-top:1px solid var(--bdr)}
.scan-st{font-size:12px;color:var(--tx3);padding:10px 14px;border-top:1px solid var(--bdr);display:none}
.scan-txt{font-size:12px;color:var(--tx2);background:var(--inp-bg);border-top:1px solid var(--bdr);padding:11px 14px;display:none;max-height:80px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;font-family:ui-monospace,monospace}
.autofill{padding:10px 14px;border-top:1px solid var(--bdr);display:none}
.autofill-btn{background:var(--fl);border:none;color:#0e1508;font-family:inherit;font-size:13px;font-weight:800;padding:11px 18px;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;min-height:44px}
.autofill-btn:active{opacity:0.85}

/* ---- PILLS ---- */
.pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:13px;font-weight:600;padding:13px 22px;border-radius:6px;cursor:pointer;white-space:nowrap;min-height:44px}
.pill:active{opacity:0.75}
.pill.p-hot{background:var(--red-bg);border-color:var(--red);color:var(--red-tx)}
.pill.p-warm{background:var(--amb-bg);border-color:var(--amb);color:var(--amb-tx)}
.pill.p-cold{background:var(--blu-bg);border-color:var(--blu);color:var(--blu-tx)}
.pill.p-prod{background:rgba(200,241,53,0.15);border-color:var(--fl);color:var(--fl)}

/* ---- VOICE ---- */
.voice-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);overflow:hidden;margin-bottom:0}
.voice-top{padding:14px 16px;display:flex;align-items:center;gap:12px}
.rec-ring{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--btn-bdr);background:var(--btn-bg);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s}
.rec-ring.on{border-color:var(--red);background:var(--red-bg);animation:rpulse 1s infinite}
@keyframes rpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.rec-ring i{font-size:22px;color:var(--btn-tx)}
.rec-ring.on i{color:var(--red)}
.v-info{flex:1}
.v-st{font-size:14px;font-weight:600;color:var(--tx)}
.v-tm{font-size:12px;color:var(--tx3);font-variant-numeric:tabular-nums;margin-top:2px}
.v-clr{background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;display:none}
.transcript{font-size:13px;color:var(--tx2);background:var(--inp-bg);border-top:1px solid var(--bdr);padding:12px 16px;min-height:48px;max-height:88px;overflow-y:auto;line-height:1.6;white-space:pre-wrap}
.qtags{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:6px;flex-wrap:wrap}
.qtag{background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:11px;font-weight:600;padding:8px 11px;border-radius:4px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;min-height:36px}
.qtag:active{opacity:0.75}

/* ---- SAVE BAR ---- */
.save-bar{background:var(--bg);border-top:1px solid var(--bdr);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:8px;flex-shrink:0}
.btn-save{flex:1;background:var(--fl);border:none;color:#0e1508;font-family:inherit;font-size:15px;font-weight:800;padding:14px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:52px}
.btn-save:active{opacity:0.85}
.btn-save:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:15px;padding:14px 18px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:52px}
.btn-ghost:active{opacity:0.75}

/* ---- LEADS CONTROLS ---- */
.l-controls{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.srch-wrap{position:relative}
.srch-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:17px;pointer-events:none}
.srch{background:var(--inp-bg);border:1px solid var(--inp-bdr);color:var(--tx);font-family:inherit;font-size:15px;padding:11px 14px 11px 42px;border-radius:var(--radius-sm);width:100%;outline:none;-webkit-appearance:none;min-height:44px}
.srch:focus{border-color:var(--fl)}
.srch::placeholder{color:var(--tx3)}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fsel{background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:13px;padding:9px 10px;border-radius:var(--radius-xs);outline:none;appearance:none;-webkit-appearance:none;width:100%;min-height:44px}
.act-row{display:flex;gap:8px}
.btn-export{flex:1;background:var(--fl);border:none;color:#0e1508;font-family:inherit;font-size:13px;font-weight:800;padding:12px;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;min-height:44px}
.btn-export:active{opacity:0.85}
.btn-del-all{background:var(--btn-bg);border:1px solid var(--red);color:var(--red-tx);font-family:inherit;font-size:13px;font-weight:700;padding:12px 14px;border-radius:var(--radius-xs);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;min-height:44px}
.btn-del-all:active{opacity:0.75}

/* ---- STATS ---- */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:13px 15px}
.stat-n{font-size:28px;font-weight:800;line-height:1;margin-bottom:3px;letter-spacing:-0.5px}
.stat-l{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase}

/* ---- LEAD CARDS ---- */
.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);padding:15px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.15s}
.lcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bdr2)}
.lcard.hot::before{background:var(--red)}
.lcard.hot{background:linear-gradient(135deg,rgba(255,82,82,0.04) 0%,var(--surf) 60%)}
.lcard.warm::before{background:var(--amb)}
.lcard.cold::before{background:var(--blu)}
.lcard:active{border-color:var(--fl)}
.lc-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.lc-av{width:44px;height:44px;border-radius:8px;background:rgba(200,241,53,0.12);border:1px solid rgba(200,241,53,0.25);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--fl);flex-shrink:0}
[data-theme=light] .lc-av{background:rgba(14,21,8,0.08);border-color:rgba(14,21,8,0.16);color:#0e1508}
.lc-name{font-size:16px;font-weight:700;color:var(--tx)}
.lc-co{font-size:13px;color:var(--tx2);margin-top:2px}
.lc-bdg{margin-left:auto;flex-shrink:0}
.bdg{display:inline-block;font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.bdg-hot{background:var(--red-bg);color:var(--red-tx);border:1px solid var(--red)}
.bdg-warm{background:var(--amb-bg);color:var(--amb-tx);border:1px solid var(--amb)}
.bdg-cold{background:var(--blu-bg);color:var(--blu-tx);border:1px solid var(--blu)}
.bdg-none{background:var(--btn-bg);color:var(--btn-tx);border:1px solid var(--btn-bdr)}
.lc-tags{display:flex;flex-wrap:wrap;gap:5px}
.lc-tag{font-size:11px;color:var(--btn-tx);background:var(--btn-bg);padding:3px 8px;border-radius:4px;border:1px solid var(--btn-bdr);font-weight:500}
.lc-action{font-size:12px;color:var(--fl);display:flex;align-items:center;gap:5px;margin-top:9px;border-top:1px solid var(--bdr);padding-top:9px;font-weight:600}

/* ---- EMPTY ---- */
.empty{text-align:center;padding:64px 20px}
.empty i{font-size:44px;color:var(--bdr2);display:block;margin-bottom:14px}
.empty-t{font-size:15px;font-weight:700;color:var(--tx2);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--tx3)}

/* ---- MODAL ---- */
.overlay{display:none;background:rgba(0,0,0,0.75);position:fixed;inset:0;z-index:1000;padding:40px 16px 20px;overflow-y:auto}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--radius);overflow:hidden;width:100%;max-width:500px}
.mhead{background:var(--bg);border-bottom:1px solid var(--bdr);padding:16px}
.mhead-top{display:flex;align-items:center;gap:12px}
.mav{width:46px;height:46px;border-radius:8px;background:rgba(200,241,53,0.12);border:1.5px solid var(--fl);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--fl);flex-shrink:0}
[data-theme=light] .mav{background:rgba(14,21,8,0.08);color:#0e1508;border-color:rgba(14,21,8,0.25)}
.mname{color:var(--tx);font-weight:800;font-size:16px}
.mco{color:var(--tx2);font-size:13px;margin-top:3px}
.mbadge{margin-left:auto}
.mbody{padding:0;max-height:60vh;overflow-y:auto}
.dr{display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-bottom:1px solid var(--bdr)}
.dr:last-child{border-bottom:none}
.dr-ic{color:var(--fl);font-size:17px;flex-shrink:0;margin-top:1px}
[data-theme=light] .dr-ic{color:#3a4e25}
.dr-k{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.dr-v{font-size:14px;color:var(--tx);line-height:1.5;word-break:break-word}
.mfoot{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--bdr)}
.m-close{flex:1;background:var(--btn-bg);border:1px solid var(--btn-bdr);color:var(--btn-tx);font-family:inherit;font-size:14px;font-weight:600;padding:12px;border-radius:var(--radius-sm);cursor:pointer;min-height:44px}
.m-close:active{opacity:0.75}
.m-del{background:var(--red-bg);border:1px solid var(--red);color:var(--red-tx);font-family:inherit;font-size:14px;font-weight:600;padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:44px}
.m-del:active{opacity:0.8}
.m-edit{background:rgba(200,241,53,0.1);border:1px solid rgba(200,241,53,0.3);color:var(--fl);font-family:inherit;font-size:14px;font-weight:600;padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:44px}
.m-edit:active{opacity:0.8}
.m-save{flex:1;background:var(--fl);border:none;color:#0e1508;font-family:inherit;font-size:14px;font-weight:800;padding:12px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.m-save:active{opacity:0.85}
.m-save:disabled{opacity:0.5;cursor:not-allowed}
.eform{padding:16px}

/* ---- TOAST ---- */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--fl);color:#0e1508;font-size:13px;font-weight:800;padding:10px 20px;border-radius:6px;white-space:nowrap;z-index:300;opacity:0;transition:opacity 0.2s;pointer-events:none}
.toast.show{opacity:1}
input[type=file]{display:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* ---- SYNC INDICATOR ---- */

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<script>
// =============================================================================
// Fluence Lead Scanner — API Client
// =============================================================================
const API_BASE = 'https://fluence-lead-scanner-api.maitilupas.workers.dev';

let token = localStorage.getItem('fl_token');
let user = JSON.parse(localStorage.getItem('fl_user_data') || 'null');
let leads = [], users = [];
let temp = '', prods = [], recr = null, recSecs = 0, recTmr = null, isRec = false, ocrTxt = '', modalId = null;
let editTemp = '', editProds = [];

// ---- API Helpers ----

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function loadLeads() {
  try {
    setSync('syncing');
    const data = await api('/api/leads');
    leads = data.leads || [];
    updateCount();
    setSync('done');
    return leads;
  } catch (e) {
    setSync('err');
    toast('Failed to load leads: ' + e.message);
    return [];
  }
}

function setSync(state) {
  const el = document.getElementById('syncInd');
  if (state === 'syncing') {
    el.innerHTML = '<i class="fa fa-cloud"></i> syncing...';
    el.className = 'sync-indicator syncing';
  } else if (state === 'done') {
    el.innerHTML = '<i class="fa fa-cloud"></i> synced';
    el.className = 'sync-indicator done';
  } else {
    el.innerHTML = '<i class="fa fa-cloud"></i> offline';
    el.className = 'sync-indicator';
  }
}

// ---- Auth ----

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!email || !password) { showLoginErr('Enter email and password'); return; }

  setLoginLoading(true);
  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });
    token = data.token;
    user = data.user;
    localStorage.setItem('fl_token', token);
    localStorage.setItem('fl_user_data', JSON.stringify(user));
    showApp();
  } catch (e) {
    showLoginErr(e.message);
  } finally {
    setLoginLoading(false);
  }
}

async function handleRegister() {
  const name = document.getElementById('loginEmail').value.trim(); // hack: reuse email field for name on register
  const email = document.getElementById('loginPass').value.trim();
  const password = prompt('Choose a password (6+ chars):');
  if (!password || password.length < 6) { showLoginErr('Password must be 6+ characters'); return; }

  setLoginLoading(true);
  try {
    const data = await api('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, password })
    });
    token = data.token;
    user = data.user;
    localStorage.setItem('fl_token', token);
    localStorage.setItem('fl_user_data', JSON.stringify(user));
    showApp();
  } catch (e) {
    showLoginErr(e.message);
  } finally {
    setLoginLoading(false);
  }
}

function showRegister() {
  document.getElementById('loginTitle').textContent = 'Register';
  document.getElementById('loginDesc').textContent = 'Create your account';
  document.getElementById('loginEmail').placeholder = 'Full name';
  document.getElementById('loginPass').placeholder = 'Email';
  document.getElementById('loginPass').type = 'email';
  document.getElementById('loginBtn').onclick = handleRegister;
  document.getElementById('loginBtnText').textContent = 'Register';
  document.querySelector('.login-reg').innerHTML = 'Already have an account? <a onclick="showLogin()">Sign in</a>';
  document.getElementById('loginErr').style.display = 'none';
}

function showLogin() {
  document.getElementById('loginTitle').textContent = 'Sign in';
  document.getElementById('loginDesc').textContent = 'Access your lead database';
  document.getElementById('loginEmail').placeholder = 'Email';
  document.getElementById('loginPass').placeholder = 'Password';
  document.getElementById('loginPass').type = 'password';
  document.getElementById('loginBtn').onclick = handleLogin;
  document.getElementById('loginBtnText').textContent = 'Sign in';
  document.querySelector('.login-reg').innerHTML = 'Don\'t have an account? <a onclick="showRegister()">Register</a>';
  document.getElementById('loginErr').style.display = 'none';
}

function setLoginLoading(loading) {
  document.getElementById('loginBtn').disabled = loading;
  document.getElementById('loginBtnText').style.display = loading ? 'none' : 'inline';
  document.getElementById('loginLoading').classList.toggle('show', loading);
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

function logout() {
  token = null;
  user = null;
  leads = [];
  localStorage.removeItem('fl_token');
  localStorage.removeItem('fl_user_data');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  showLogin();
}

// ---- App Init ----

async function init() {
  const th = localStorage.getItem('fl_theme') || 'dark';
  applyTheme(th);

  // Offline detection
  function updateOffline() { document.getElementById('offlineBar').style.display = navigator.onLine ? 'none' : 'flex'; }
  window.addEventListener('online', updateOffline);
  window.addEventListener('offline', updateOffline);
  updateOffline();

  if (token && user) {
    document.getElementById('userName').textContent = user.name;
    showApp();
    return;
  }

  document.getElementById('loginScreen').style.display = 'flex';
}

async function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('userName').textContent = user.name;

  const sn = localStorage.getItem('fl_show');
  if (sn) document.getElementById('showTag').textContent = sn;

  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById('f_due').value = d.toISOString().slice(0, 10);

  // Load users first so dropdowns are populated before we set defaults
  await loadUsers();

  // Default assigned-to to logged-in user
  const ownerSel = document.getElementById('f_owner');
  if ([...ownerSel.options].some(o => o.value === user.name)) {
    ownerSel.value = user.name;
    document.getElementById('userSel').value = user.name;
  }

  await loadLeads();
  renderLeads();
}

// ---- UI ----

function applyTheme(th) {
  document.getElementById('app').setAttribute('data-theme', th);
  document.getElementById('themeBtn').textContent = th === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('fl_theme', th);
}

function toggleTheme() {
  applyTheme(document.getElementById('app').getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function editShow() {
  const n = prompt('Event name:', document.getElementById('showTag').textContent);
  if (n && n.trim()) { document.getElementById('showTag').textContent = n.trim(); localStorage.setItem('fl_show', n.trim()); }
}

function switchTab(t) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('panel-' + t).classList.add('active');
  if (t === 'leads') renderLeads();
}

function onUserChange() {
  document.getElementById('f_owner').value = document.getElementById('userSel').value;
}

function updateCount() {
  const el = document.getElementById('leadCount');
  leads.length ? (el.textContent = leads.length, el.style.display = 'inline') : el.style.display = 'none';
}

// ---- Scan ----

function triggerCam() { document.getElementById('camIn').click() }
function triggerFile() { document.getElementById('fileIn').click() }

function handleScan(inp) {
  const file = inp.files[0]; if (!file) return;
  const pr = document.getElementById('scanPrev'); pr.src = URL.createObjectURL(file); pr.style.display = 'block';
  const st = document.getElementById('scanSt'); st.style.display = 'block'; st.textContent = 'Scanning...';
  document.getElementById('scanTxt').style.display = 'none';
  document.getElementById('autofill').style.display = 'none';
  if (typeof Tesseract !== 'undefined') {
    Tesseract.recognize(file, 'eng', { logger: m => { if (m.status === 'recognizing text') st.textContent = 'Scanning ' + Math.round(m.progress * 100) + '%...'; } })
      .then(({ data: { text } }) => {
        ocrTxt = text;
        const b = document.getElementById('scanTxt'); b.textContent = text; b.style.display = 'block';
        document.getElementById('autofill').style.display = 'block';
        st.textContent = '✓ Scanned — tap auto-fill';
      }).catch(() => { st.textContent = 'Scan failed — fill manually'; });
  } else st.textContent = 'OCR unavailable — fill manually';
  inp.value = '';
}

function applyOCR() {
  if (!ocrTxt) return;
  const em = ocrTxt.match(/[\w.+-]+@[\w-]+\.[\w.]+/);
  const ph = ocrTxt.match(/[+\(]?[\d\s\-\(\)]{8,}/);
  const li = ocrTxt.match(/linkedin\.com\/in\/[\w-]+/i);
  if (em) document.getElementById('f_email').value = em[0];
  if (ph) document.getElementById('f_phone').value = ph[0].trim();
  if (li) document.getElementById('f_linkedin').value = li[0];
  const lines = ocrTxt.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines[0]) document.getElementById('f_company').value = lines[0];
  if (lines[1]) { const p = lines[1].split(' '); p.length >= 2 ? (document.getElementById('f_first').value = p[0], document.getElementById('f_last').value = p.slice(1).join(' ')) : document.getElementById('f_first').value = lines[1]; }
  toast('Fields filled from scan');
}

function pickTemp(el, v) {
  document.querySelectorAll('#tempPills .pill').forEach(p => p.className = 'pill');
  temp = v; el.classList.add('p-' + v);
}

function togProd(el, v) {
  const i = prods.indexOf(v);
  i > -1 ? (prods.splice(i, 1), el.className = 'pill') : (prods.push(v), el.classList.add('p-prod'));
}

// ---- Voice ----

function toggleRec() { isRec ? stopRec() : startRec() }

function startRec() {
  if (!navigator.mediaDevices) { toast('Mic not available'); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const chunks = [];
    recr = new MediaRecorder(stream);
    recr.ondataavailable = e => chunks.push(e.data);
    recr.onstop = () => { stream.getTracks().forEach(t => t.stop()); handleRec(chunks); };
    recr.start(); isRec = true; recSecs = 0;
    document.getElementById('recRing').classList.add('on');
    document.getElementById('recIc').className = 'fa fa-stop';
    document.getElementById('vSt').textContent = 'Recording...';
    recTmr = setInterval(() => { recSecs++; const m = Math.floor(recSecs / 60), s = recSecs % 60; document.getElementById('vTm').textContent = m + ':' + (s < 10 ? '0' : '') + s; }, 1000);
  }).catch(() => toast('Microphone access denied'));
}

function stopRec() {
  if (recr) recr.stop(); clearInterval(recTmr); isRec = false;
  document.getElementById('recRing').classList.remove('on');
  document.getElementById('recIc').className = 'fa fa-microphone';
  document.getElementById('vSt').textContent = 'Note recorded';
  document.getElementById('vClr').style.display = 'inline-block';
}

function handleRec() {
  document.getElementById('transcript').textContent = '[Voice note: ' + recSecs + 's — add tags or type notes]';
}

function clearVoice() {
  document.getElementById('transcript').textContent = 'Voice notes appear here...';
  document.getElementById('vTm').textContent = '0:00';
  document.getElementById('vClr').style.display = 'none';
  document.getElementById('vSt').textContent = 'Tap to record';
  recSecs = 0;
}

function addTag(t) {
  const b = document.getElementById('transcript');
  const c = b.textContent;
  b.textContent = c === 'Voice notes appear here...' ? '[' + t + ']' : c + ' [' + t + ']';
}

// ---- Save / CRUD ----

async function saveLead() {
  const first = document.getElementById('f_first').value.trim();
  const last = document.getElementById('f_last').value.trim();
  const co = document.getElementById('f_company').value.trim();
  if (!first && !last && !co) { toast('Add a name or company'); return; }

  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';

  try {
    const data = await api('/api/leads', {
      method: 'POST',
      body: JSON.stringify({
        first_name: first, last_name: last, company: co,
        title: document.getElementById('f_title').value.trim(),
        email: document.getElementById('f_email').value.trim(),
        phone: document.getElementById('f_phone').value.trim(),
        linkedin: document.getElementById('f_linkedin').value.trim(),
        country: document.getElementById('f_country').value.trim(),
        temperature: temp,
        deal_size: document.getElementById('f_deal').value,
        timeline: document.getElementById('f_time').value,
        products: prods,
        notes: document.getElementById('f_notes').value.trim(),
        assigned_to: document.getElementById('f_owner').value,
        next_action: document.getElementById('f_action').value,
        due_date: document.getElementById('f_due').value,
        priority: document.getElementById('f_prio').value,
        transcript: document.getElementById('transcript').textContent,
        show_name: document.getElementById('showTag').textContent,
      })
    });

    leads.unshift(data.lead);
    updateCount();
    navigator.vibrate && navigator.vibrate(30);
    toast('Lead saved ✓');
    clearForm();
  } catch (e) {
    toast('Error: ' + e.message);
  } finally {
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').innerHTML = '<i class="fa fa-check"></i> Save lead';
  }
}

function clearForm() {
  ['f_first', 'f_last', 'f_title', 'f_company', 'f_email', 'f_phone', 'f_linkedin', 'f_country', 'f_notes', 'f_deal', 'f_time', 'f_action', 'f_prio'].forEach(id => document.getElementById(id).value = '');
  temp = ''; prods = [];
  document.querySelectorAll('#tempPills .pill,#prodPills .pill').forEach(p => p.className = 'pill');
  document.getElementById('scanPrev').style.display = 'none';
  document.getElementById('scanTxt').style.display = 'none';
  document.getElementById('autofill').style.display = 'none';
  document.getElementById('scanSt').style.display = 'none';
  ocrTxt = ''; clearVoice();
  document.getElementById('f_owner').value = document.getElementById('userSel').value;
  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById('f_due').value = d.toISOString().slice(0, 10);
}

// ---- Users ----

async function loadUsers() {
  try {
    const data = await api('/api/users');
    users = data.users || [];
    populateUserSelects();
  } catch (e) {
    // silently degrade — selects remain empty
  }
}

function populateUserSelects() {
  const opts = users.map(u => `<option value="${esc(u.name)}">${esc(u.name)}</option>`).join('');

  // Capture form owner select
  const fo = document.getElementById('f_owner');
  const foCurr = fo.value;
  fo.innerHTML = opts;
  if ([...fo.options].some(o => o.value === foCurr)) fo.value = foCurr;

  // Hidden global userSel (kept for onUserChange compatibility)
  const us = document.getElementById('userSel');
  const usCurr = us.value;
  us.innerHTML = opts;
  if ([...us.options].some(o => o.value === usCurr)) us.value = usCurr;
  else if (user && [...us.options].some(o => o.value === user.name)) us.value = user.name;

  // Leads filter
  const fu = document.getElementById('fUser');
  fu.innerHTML = '<option value="">All reps</option>' + opts;
}

// ---- Leads List ----

function renderLeads() {
  const q = document.getElementById('srch').value.toLowerCase();
  const fu = document.getElementById('fUser').value;
  const ft = document.getElementById('fTemp').value;

  const fl = leads.filter(l => {
    const txt = [l.first_name, l.last_name, l.company, l.title, l.email, l.notes, l.country].join(' ').toLowerCase();
    return (!q || txt.includes(q)) && (!fu || l.assigned_to === fu) && (!ft || l.temperature === ft);
  });

  const hot = fl.filter(l => l.temperature === 'hot').length;
  const warm = fl.filter(l => l.temperature === 'warm').length;
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = fl.filter(l => l.created_at && l.created_at.slice(0, 10) === today).length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-n" style="color:var(--fl)">${fl.length}</div><div class="stat-l">Total leads</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${hot}</div><div class="stat-l">🔥 Hot</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--amb)">${warm}</div><div class="stat-l">🌤 Warm</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--blu)">${todayCount}</div><div class="stat-l">📅 Today</div></div>`;

  if (!fl.length) {
    document.getElementById('leadsList').innerHTML = '<div class="empty"><i class="fa fa-users"></i><div class="empty-t">No leads yet</div><div class="empty-s">Capture your first lead above</div></div>';
    return;
  }

  document.getElementById('leadsList').innerHTML = fl.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).map(l => {
    const nm = [l.first_name, l.last_name].filter(Boolean).join(' ') || 'Unknown';
    const ini = nm.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const tc = l.temperature || ''; const bc = tc ? 'bdg-' + tc : 'bdg-none';
    const tempEmoji = tc === 'hot' ? '🔥' : tc === 'warm' ? '🌤' : tc === 'cold' ? '❄️' : '';
    const bl = tc ? tempEmoji + ' ' + tc.toUpperCase() : '—';
    const tags = [];
    if (l.deal_size) tags.push(l.deal_size);
    if (l.products) {
      try {
        const p = typeof l.products === 'string' ? JSON.parse(l.products) : l.products;
        if (p.length) tags.push(p[0] + (p.length > 1 ? ' +' + (p.length - 1) : ''));
      } catch(e) {}
    }
    if (l.assigned_to) tags.push(l.assigned_to.split(' ')[0]);
    const act = l.next_action && l.next_action !== 'No Action' ? '<div class="lc-action"><i class="fa fa-arrow-right"></i>' + l.next_action + (l.due_date ? ' · ' + l.due_date : '') + '</div>' : '';
    return '<div class="lcard ' + tc + '" onclick="viewLead(' + l.id + ')">' +
      '<div class="lc-top">' +
      '<div class="lc-av">' + ini + '</div>' +
      '<div style="flex:1"><div class="lc-name">' + nm + '</div><div class="lc-co">' + (l.company || '—') + (l.title ? ' · ' + l.title : '') + '</div></div>' +
      '<div class="lc-bdg"><span class="bdg ' + bc + '">' + bl + '</span></div>' +
      '</div>' +
      '<div class="lc-tags">' + tags.map(t => '<span class="lc-tag">' + t + '</span>').join('') + '</div>' +
      act +
      '</div>';
  }).join('');
}

// ---- Lead Detail Modal ----

function viewLead(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  modalId = id;
  const nm = [l.first_name, l.last_name].filter(Boolean).join(' ') || 'Unknown';
  const ini = nm.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  const tc = l.temperature || ''; const bc = tc ? 'bdg-' + tc : 'bdg-none';
  const tempEmoji = tc === 'hot' ? '🔥' : tc === 'warm' ? '🌤' : tc === 'cold' ? '❄️' : '';
  document.getElementById('mAv').textContent = ini;
  document.getElementById('mName').textContent = nm;
  document.getElementById('mCo').textContent = [l.company, l.title].filter(Boolean).join(' · ') || '—';
  document.getElementById('mBdg').innerHTML = tc ? '<span class="bdg ' + bc + '">' + tempEmoji + ' ' + tc.toUpperCase() + '</span>' : '';

  let prods = '—';
  if (l.products) {
    try { const p = typeof l.products === 'string' ? JSON.parse(l.products) : l.products; if (p.length) prods = p.join(', '); } catch(e) {}
  }

  const rows = [
    ['fa-envelope', 'Email', l.email || '—'], ['fa-phone', 'Phone', l.phone || '—'],
    ['fa-location-dot', 'Country', l.country || '—'], ['fa-linkedin', 'LinkedIn', l.linkedin || '—'],
    ['fa-coins', 'Deal size', l.deal_size || '—'], ['fa-clock', 'Timeline', l.timeline || '—'],
    ['fa-lightbulb', 'Products', prods],
    ['fa-user', 'Assigned to', l.assigned_to || '—'], ['fa-note-sticky', 'Notes', l.notes || '—'],
    ['fa-microphone', 'Voice', l.transcript && l.transcript !== 'Voice notes appear here...' ? l.transcript : '—'],
    ['fa-arrow-right', 'Next action', l.next_action || '—'], ['fa-calendar', 'Due', l.due_date || '—'], ['fa-flag', 'Priority', l.priority || '—'],
    ['fa-calendar-plus', 'Captured', l.created_at ? new Date(l.created_at).toLocaleString('en-GB') : '—'],
  ].map(([ic, k, v]) => '<div class="dr"><i class="fa ' + ic + ' dr-ic"></i><div><div class="dr-k">' + k + '</div><div class="dr-v">' + v + '</div></div></div>').join('');

  document.getElementById('mBody').innerHTML = rows;
  document.getElementById('mFoot').innerHTML = `
    <button class="m-close" onclick="closeModal()">Close</button>
    <button class="m-edit" onclick="startEdit()"><i class="fa fa-pen"></i> Edit</button>
    <button class="m-del" onclick="delModal()"><i class="fa fa-trash"></i> Delete</button>`;
  document.getElementById('overlay').classList.add('open');
}

function maybeClose(e) { if (e.target.id === 'overlay') closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); modalId = null; }
function delModal() { if (modalId) delLead(modalId); closeModal(); }

// ---- Edit Lead ----

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function startEdit() {
  const l = leads.find(x => x.id === modalId); if (!l) return;
  editTemp = l.temperature || '';
  try { editProds = typeof l.products === 'string' ? JSON.parse(l.products) : (l.products || []); } catch(e) { editProds = []; }

  const tempPills = ['hot','warm','cold'].map(v =>
    `<button class="pill${editTemp===v?' p-'+v:''}" onclick="pickEditTemp(this,'${v}')">${v==='hot'?'🔥 Hot':v==='warm'?'🌤 Warm':'❄️ Cold'}</button>`
  ).join('');

  const dealOpts = ['< €50K','€50K–250K','€250K–1M','> €1M'];
  const timeOpts = ['< 3 months','3–6 months','6–12 months','12 months+'];
  const actionOpts = ['Send Proposal','Schedule Demo','Follow-up Call','Send Samples','Technical Meeting','Pricing Discussion','No Action'];
  const prioOpts = ['P1 — This week','P2 — This month','P3 — When possible'];
  const productList = ['SPYDR','VYPR','RAPTR','RAZR','VYNE','PYTHN','Controllers','Services'];

  const ownerOpts = users.length
    ? users.map(u => `<option value="${esc(u.name)}"${u.name === l.assigned_to ? ' selected' : ''}>${esc(u.name)}</option>`).join('')
    : `<option value="${esc(l.assigned_to)}">${esc(l.assigned_to)}</option>`;

  document.getElementById('mBody').innerHTML = `<div class="eform">
    <div class="sec" style="margin-top:0">Contact</div>
    <div class="g2">
      <div class="field"><label class="lbl">First name</label><input class="inp" id="e_first" value="${esc(l.first_name)}"></div>
      <div class="field"><label class="lbl">Last name</label><input class="inp" id="e_last" value="${esc(l.last_name)}"></div>
    </div>
    <div class="field"><label class="lbl">Title</label><input class="inp" id="e_title" value="${esc(l.title)}"></div>
    <div class="field"><label class="lbl">Company</label><input class="inp" id="e_company" value="${esc(l.company)}"></div>
    <div class="g2">
      <div class="field"><label class="lbl">Email</label><input class="inp" id="e_email" type="email" value="${esc(l.email)}"></div>
      <div class="field"><label class="lbl">Phone</label><input class="inp" id="e_phone" type="tel" value="${esc(l.phone)}"></div>
    </div>
    <div class="g2">
      <div class="field"><label class="lbl">Country</label><input class="inp" id="e_country" value="${esc(l.country)}"></div>
      <div class="field"><label class="lbl">LinkedIn</label><input class="inp" id="e_linkedin" value="${esc(l.linkedin)}"></div>
    </div>
    <div class="sec">Opportunity</div>
    <div class="field"><label class="lbl">Temperature</label>
      <div class="pills" id="eTempPills">${tempPills}</div>
    </div>
    <div class="g2">
      <div class="field"><label class="lbl">Deal size</label>
        <select class="inp" id="e_deal"><option value="">— Select —</option>${dealOpts.map(v=>`<option${l.deal_size===v?' selected':''}>${esc(v)}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="lbl">Timeline</label>
        <select class="inp" id="e_time"><option value="">— Select —</option>${timeOpts.map(v=>`<option${l.timeline===v?' selected':''}>${esc(v)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label class="lbl">Product interest</label>
      <div class="pills" id="eProdPills">${productList.map(p=>`<button class="pill${editProds.includes(p)?' p-prod':''}" onclick="togEditProd(this,'${p}')">${p}</button>`).join('')}</div>
    </div>
    <div class="field"><label class="lbl">Assigned to</label>
      <select class="inp" id="e_owner">${ownerOpts}</select>
    </div>
    <div class="field"><label class="lbl">Notes</label><textarea class="inp" id="e_notes">${esc(l.notes)}</textarea></div>
    <div class="sec">Next action</div>
    <div class="field">
      <select class="inp" id="e_action"><option value="">— Select action —</option>${actionOpts.map(v=>`<option${l.next_action===v?' selected':''}>${esc(v)}</option>`).join('')}</select>
    </div>
    <div class="g2">
      <div class="field"><label class="lbl">Due date</label><input class="inp" type="date" id="e_due" value="${esc(l.due_date)}"></div>
      <div class="field"><label class="lbl">Priority</label>
        <select class="inp" id="e_prio"><option value="">—</option>${prioOpts.map(v=>`<option${l.priority===v?' selected':''}>${esc(v)}</option>`).join('')}</select>
      </div>
    </div>
  </div>`;

  document.getElementById('mFoot').innerHTML = `
    <button class="m-close" onclick="cancelEdit()">Cancel</button>
    <button class="m-save" id="mSaveBtn" onclick="saveEdit()"><i class="fa fa-check"></i> Save</button>`;
}

function pickEditTemp(el, v) {
  document.querySelectorAll('#eTempPills .pill').forEach(p => p.className = 'pill');
  editTemp = v; el.classList.add('p-' + v);
}

function togEditProd(el, v) {
  const i = editProds.indexOf(v);
  i > -1 ? (editProds.splice(i, 1), el.className = 'pill') : (editProds.push(v), el.classList.add('p-prod'));
}

function cancelEdit() { viewLead(modalId); }

async function saveEdit() {
  const btn = document.getElementById('mSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
  try {
    const data = await api('/api/leads/' + modalId, {
      method: 'PUT',
      body: JSON.stringify({
        first_name: document.getElementById('e_first').value.trim(),
        last_name:  document.getElementById('e_last').value.trim(),
        title:      document.getElementById('e_title').value.trim(),
        company:    document.getElementById('e_company').value.trim(),
        email:      document.getElementById('e_email').value.trim(),
        phone:      document.getElementById('e_phone').value.trim(),
        country:    document.getElementById('e_country').value.trim(),
        linkedin:   document.getElementById('e_linkedin').value.trim(),
        temperature: editTemp,
        deal_size:  document.getElementById('e_deal').value,
        timeline:   document.getElementById('e_time').value,
        products:   editProds,
        assigned_to: document.getElementById('e_owner').value,
        notes:      document.getElementById('e_notes').value.trim(),
        next_action: document.getElementById('e_action').value,
        due_date:   document.getElementById('e_due').value,
        priority:   document.getElementById('e_prio').value,
      })
    });
    const idx = leads.findIndex(x => x.id === modalId);
    if (idx > -1) leads[idx] = { ...leads[idx], ...data.lead };
    renderLeads();
    toast('Lead updated ✓');
    viewLead(modalId); // return to view mode
  } catch (e) {
    toast('Error: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-check"></i> Save';
  }
}

async function delLead(id) {
  try {
    await api('/api/leads/' + id, { method: 'DELETE' });
    leads = leads.filter(l => l.id !== id);
    updateCount();
    renderLeads();
    navigator.vibrate && navigator.vibrate([20, 30, 20]);
    toast('Lead deleted');
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

async function clearAll() {
  if (!leads.length) { toast('No leads to clear'); return; }
  if (!confirm('Delete all ' + leads.length + ' leads? Cannot be undone.')) return;

  for (const l of [...leads]) {
    try { await api('/api/leads/' + l.id, { method: 'DELETE' }); } catch(e) {}
  }
  leads = [];
  updateCount();
  renderLeads();
  toast('All leads cleared');
}

// ---- Export ----

async function exportXLS() {
  if (!leads.length) { toast('No leads to export'); return; }

  // Refresh from server to get latest
  try {
    setSync('syncing');
    const data = await api('/api/leads');
    leads = data.leads || [];
    setSync('done');
  } catch(e) { setSync('err'); }

  const rows = leads.map(l => ({
    'First Name': l.first_name || '',
    'Last Name': l.last_name || '',
    'Company': l.company || '',
    'Title': l.title || '',
    'Email': l.email || '',
    'Phone': l.phone || '',
    'Country': l.country || '',
    'LinkedIn': l.linkedin || '',
    'Temperature': (l.temperature || '').toUpperCase(),
    'Deal Size': l.deal_size || '',
    'Timeline': l.timeline || '',
    'Products': (() => { try { const p = typeof l.products === 'string' ? JSON.parse(l.products) : (l.products || []); return Array.isArray(p) ? p.join('; ') : ''; } catch(e) { return ''; } })(),
    'Assigned To': l.assigned_to || '',
    'Notes': l.notes || '',
    'Voice Notes': l.transcript || '',
    'Next Action': l.next_action || '',
    'Due Date': l.due_date || '',
    'Priority': l.priority || '',
    'Show': l.show_name || '',
    'Captured': l.created_at ? new Date(l.created_at).toLocaleString('en-GB') : ''
  }));

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{ wch: 12 }, { wch: 14 }, { wch: 22 }, { wch: 22 }, { wch: 28 }, { wch: 14 }, { wch: 14 }, { wch: 26 }, { wch: 10 }, { wch: 14 }, { wch: 14 }, { wch: 24 }, { wch: 18 }, { wch: 36 }, { wch: 36 }, { wch: 20 }, { wch: 12 }, { wch: 16 }, { wch: 18 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Leads');

  const sum = [
    ['FLUENCE LEAD EXPORT'],
    ['Show:', leads[0]?.show_name || '', 'Export date:', new Date().toLocaleDateString('en-GB')],
    [''],
    ['Total leads:', leads.length, 'Hot:', leads.filter(l => l.temperature === 'hot').length],
    ['Warm:', leads.filter(l => l.temperature === 'warm').length, 'Cold:', leads.filter(l => l.temperature === 'cold').length],
    [''],
    ['Actions pending:', leads.filter(l => l.next_action && l.next_action !== 'No Action').length],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(sum); ws2['!cols'] = [{ wch: 18 }, { wch: 20 }, { wch: 14 }, { wch: 16 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');
  XLSX.writeFile(wb, 'Fluence_Leads_' + new Date().toISOString().slice(0, 10) + '.xlsx');
  toast('Exported · ' + leads.length + ' leads');
}

function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ---- Keyboard ----

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    const btn = document.getElementById('loginBtn');
    if (!btn.disabled) btn.click();
  }
});

// ---- Start ----
init();
</script>
